<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FAF6F0">
  <title>Asma Allah Al-Husna</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #B8860B;
      --gold-light: #D4A84B;
      --gold-bg: rgba(184,134,11,0.05);
      --cream: #FAF6F0;
      --white: #FFFFFF;
      --ink: #1A1A1A;
      --ink-light: #4A4A4A;
      --success: #2D6A4F;
      --error: #9B2226;
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      margin: 0; padding: 0; background: var(--cream); 
      font-family: 'Cormorant Garamond', serif; color: var(--ink);
      height: 100dvh; overflow: hidden;
    }

    .app-container {
      max-width: 500px; margin: 0 auto; height: 100%;
      display: flex; flex-direction: column; position: relative;
    }

    /* Header */
    header {
      padding: 20px 20px 10px; text-align: center; flex-shrink: 0;
    }
    .bismillah { 
      font-family: 'Noto Sans Arabic', sans-serif; font-size: 18px; 
      color: var(--gold); opacity: 0.8; margin-bottom: 5px;
    }
    header h1 { font-size: 24px; margin: 0; letter-spacing: 1px; }

    /* Main Area */
    main {
      flex: 1; overflow-y: auto; padding: 10px 20px 120px;
      scrollbar-width: none;
    }
    main::-webkit-scrollbar { display: none; }

    /* Flashcard Style - STABLE LAYOUT */
    .card {
      background: var(--white); border-radius: 30px; padding: 40px 25px;
      box-shadow: var(--shadow); border: 1px solid rgba(184,134,11,0.1);
      text-align: center; position: relative; transition: transform 0.3s ease;
      min-height: 380px; display: flex; flex-direction: column; justify-content: space-between;
    }

    .card-num { font-size: 12px; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
    .card-ar { font-family: 'Noto Sans Arabic', sans-serif; font-size: 52px; margin: 15px 0; }
    .card-trans { font-size: 24px; color: var(--gold); font-weight: 600; margin-bottom: 10px; }
    
    /* Reveal Zone: Fixing the jump */
    .reveal-zone {
      min-height: 120px; /* Espace réservé pour éviter que le layout bouge */
      border-top: 1px solid var(--cream); margin-top: 20px; padding-top: 20px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .meaning { font-size: 20px; font-style: italic; animation: fadeIn 0.4s ease; }
    .placeholder { color: var(--gold); font-size: 13px; opacity: 0.5; cursor: pointer; }

    /* Navigation Card */
    .card-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 25px; gap: 15px;
    }
    .btn-circle {
      width: 54px; height: 54px; border-radius: 50%; border: 1px solid var(--gold);
      background: var(--white); color: var(--gold); font-size: 24px; cursor: pointer;
    }
    .btn-master {
      flex: 1; padding: 16px; border-radius: 30px; border: none; font-weight: bold;
      cursor: pointer; transition: 0.3s; font-size: 14px; letter-spacing: 1px;
    }
    .btn-master.off { background: var(--white); border: 1px solid var(--gold); color: var(--gold); }
    .btn-master.on { background: var(--success); color: white; }

    /* Tabs Bar */
    .tabs {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.8); backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      display: flex; justify-content: space-around; padding: 15px 10px 30px;
      border-top: 1px solid rgba(0,0,0,0.05); z-index: 100;
    }
    .tab-item {
      background: none; border: none; display: flex; flex-direction: column;
      align-items: center; gap: 5px; color: var(--ink-light); opacity: 0.4; transition: 0.3s;
    }
    .tab-item.active { opacity: 1; color: var(--gold); }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 11px; font-weight: bold; }

    /* Quiz & Games */
    .quiz-option {
      background: white; border: 1px solid var(--gold-bg); padding: 18px;
      border-radius: 20px; width: 100%; margin-bottom: 12px; font-size: 17px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: 0.2s;
    }
    .quiz-option.correct { background: var(--success) !important; color: white; }
    .quiz-option.wrong { background: var(--error) !important; color: white; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Filters */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
    .filter-pill {
      white-space: nowrap; padding: 8px 16px; border-radius: 20px; background: white;
      border: 1px solid var(--gold-bg); font-size: 12px; font-weight: bold;
    }
    .filter-pill.active { background: var(--gold); color: white; }
  </style>
</head>

// ETAT DE L'APP
let state = {
  view: 'learn',
  learnIdx: 0,
  isFlipped: false,
  mastered: new Set(JSON.parse(localStorage.getItem('asma-mastered') || '[]')),
  stats: JSON.parse(localStorage.getItem('asma-stats') || '{}'),
  quiz: { q: null, selected: null },
  match: { pairs: [], leftId: null, matched: new Set(), animating: false }
};

function save() {
  localStorage.setItem('asma-mastered', JSON.stringify([...state.mastered]));
  localStorage.setItem('asma-stats', JSON.stringify(state.stats));
}

// NAVIGATION
function nav(view) {
  state.view = view;
  state.isFlipped = false;
  document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
  document.querySelector(`[onclick="nav('${view}')"]`).classList.add('active');
  render();
}

function render() {
  const container = document.getElementById('app-content');
  const title = document.getElementById('page-title');

  if(state.view === 'learn') {
    title.innerText = "Apprentissage";
    const n = NAMES[state.learnIdx];
    const isM = state.mastered.has(n.id);
    container.innerHTML = `
      <div class="card" onclick="state.isFlipped = !state.isFlipped; render()">
        <div class="card-num">NOM ${n.id} / 99</div>
        <div class="card-ar">${n.ar}</div>
        <div class="card-trans">${n.trans}</div>
        <div class="reveal-zone">
          ${state.isFlipped ? `<div class="meaning">${n.fr}</div>` : `<div class="placeholder">Appuie pour voir le sens</div>`}
        </div>
      </div>
      <div class="card-nav">
        <button class="btn-circle" onclick="changeName(-1); event.stopPropagation()">‹</button>
        <button class="btn-master ${isM?'on':'off'}" onclick="toggleMaster(${n.id}); event.stopPropagation()">
          ${isM ? '✓ ACQUIS' : 'MARQUER ACQUIS'}
        </button>
        <button class="btn-circle" onclick="changeName(1); event.stopPropagation()">›</button>
      </div>
    `;
  }

  if(state.view === 'quiz') {
    title.innerText = "Quiz";
    if(!state.quiz.q) nextQuiz();
    const q = state.quiz.q;
    container.innerHTML = `
      <div style="text-align:center; padding: 20px 0;">
        <p style="color:var(--ink-light)">Que signifie ce Nom ?</p>
        <div style="font-family:'Noto Sans Arabic'; font-size:45px; margin:15px 0;">${q.target.ar}</div>
      </div>
      <div class="quiz-options">
        ${q.options.map(opt => {
          let cls = '';
          if(state.quiz.selected) {
            if(opt.id === q.target.id) cls = 'correct';
            else if(opt.id === state.quiz.selected) cls = 'wrong';
          }
          return `<button class="quiz-option ${cls}" onclick="handleQuiz(${opt.id})" ${state.quiz.selected?'disabled':''}>${opt.fr}</button>`;
        }).join('')}
      </div>
    `;
  }

  if(state.view === 'match') {
    title.innerText = "Relier les Paires";
    if(state.match.pairs.length === 0) initMatch();
    
    if(state.match.matched.size === 5) {
      container.innerHTML = `<div style="text-align:center; padding:50px 20px;"><h2>Bravo ! 🎉</h2><button class="btn-master on" onclick="initMatch()">Rejouer</button></div>`;
      return;
    }

    container.innerHTML = `
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div style="display:flex; flex-direction:column; gap:10px;">
          ${state.match.leftSide.map(n => `
            <button class="quiz-option ${state.match.matched.has(n.id)?'correct':''} ${state.match.leftId===n.id?'wrong':''}" 
              style="padding:12px; font-family:'Noto Sans Arabic'; font-size:18px; visibility:${state.match.matched.has(n.id)?'hidden':'visible'}"
              onclick="selectMatchLeft(${n.id})">${n.ar}</button>
          `).join('')}
        </div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          ${state.match.rightSide.map(n => `
            <button class="quiz-option" style="padding:12px; font-size:14px; visibility:${state.match.matched.has(n.id)?'hidden':'visible'}"
              onclick="selectMatchRight(${n.id})">${n.fr}</button>
          `).join('')}
        </div>
      </div>
    `;
  }

  if(state.view === 'stats') {
    title.innerText = "Progression";
    const pct = Math.round((state.mastered.size / 99) * 100);
    container.innerHTML = `
      <div class="card" style="min-height: auto; padding: 30px;">
        <div class="card-num">PROGRESSION GLOBALE</div>
        <div style="font-size:48px; font-weight:bold; color:var(--gold); margin:10px 0;">${pct}%</div>
        <div style="width:100%; height:8px; background:var(--cream); border-radius:10px; overflow:hidden;">
          <div style="width:${pct}%; height:100%; background:var(--gold);"></div>
        </div>
        <p style="margin-top:15px; font-size:14px; color:var(--ink-light)">${state.mastered.size} noms maîtrisés sur 99</p>
      </div>
      <button class="btn-master off" style="margin-top:20px; width:100%; color:var(--error); border-color:var(--error);" onclick="resetAll()">Réinitialiser tout</button>
    `;
  }
}

// LOGIQUE ETUDE
function changeName(dir) {
  state.learnIdx = (state.learnIdx + dir + 99) % 99;
  state.isFlipped = false;
  render();
}
function toggleMaster(id) {
  if(state.mastered.has(id)) state.mastered.delete(id);
  else state.mastered.add(id);
  save();
  render();
}

// LOGIQUE QUIZ
function nextQuiz() {
  const target = NAMES[Math.floor(Math.random()*99)];
  const wrongs = shuffle(NAMES.filter(n => n.id !== target.id)).slice(0,3);
  state.quiz = { q: { target, options: shuffle([target, ...wrongs]) }, selected: null };
}
function handleQuiz(id) {
  state.quiz.selected = id;
  render();
  setTimeout(() => { nextQuiz(); render(); }, 1500);
}

// LOGIQUE MATCH (RELIER)
function initMatch() {
  const batch = shuffle(NAMES).slice(0, 5);
  state.match = { 
    leftSide: shuffle([...batch]), 
    rightSide: shuffle([...batch]), 
    leftId: null, 
    matched: new Set(),
    animating: false
  };
  render();
}
function selectMatchLeft(id) {
  if(state.match.animating) return;
  state.match.leftId = id;
  render();
}
function selectMatchRight(id) {
  if(!state.match.leftId || state.match.animating) return;
  if(state.match.leftId === id) {
    state.match.matched.add(id);
    state.match.leftId = null;
    render();
  } else {
    state.match.animating = true;
    setTimeout(() => { state.match.leftId = null; state.match.animating = false; render(); }, 500);
  }
}

// UTILS
function shuffle(a) { return a.sort(() => Math.random() - 0.5); }
function resetAll() { if(confirm("Effacer toute ta progression ?")) { localStorage.clear(); location.reload(); } }

// START
render();
</script>
