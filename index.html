<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FAF6F0">
  <title>Asma Allah Al-Husna</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #B8860B; --gold-light: #D4A84B; --gold-bg: rgba(184,134,11,0.05);
      --cream: #FAF6F0; --white: #FFFFFF; --ink: #1A1A1A; --ink-light: #4A4A4A;
      --success: #2D6A4F; --error: #9B2226; --shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; background: var(--cream); font-family: 'Cormorant Garamond', serif; 
      color: var(--ink); height: 100dvh; overflow: hidden;
    }

    .app-container { max-width: 500px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; position: relative; }

    header { padding: 20px 20px 10px; text-align: center; flex-shrink: 0; }
    .bismillah { font-family: 'Noto Sans Arabic', sans-serif; font-size: 18px; color: var(--gold); opacity: 0.8; }
    header h1 { font-size: 22px; margin: 0; letter-spacing: 1px; }

    main { flex: 1; overflow-y: auto; padding: 10px 20px 100px; scrollbar-width: none; }
    main::-webkit-scrollbar { display: none; }

    /* Flashcard & UI Elements */
    .card {
      background: var(--white); border-radius: 30px; padding: 30px 25px;
      box-shadow: var(--shadow); border: 1px solid rgba(184,134,11,0.1);
      text-align: center; min-height: 360px; display: flex; flex-direction: column; justify-content: space-between;
    }
    .card-num { font-size: 12px; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
    .card-ar { font-family: 'Noto Sans Arabic', sans-serif; font-size: 48px; margin: 10px 0; }
    .card-trans { font-size: 22px; color: var(--gold); font-weight: 600; }
    
    .reveal-zone { min-height: 100px; display: flex; align-items: center; justify-content: center; border-top: 1px solid var(--cream); margin-top: 15px; }
    .meaning { font-size: 19px; font-style: italic; animation: fadeIn 0.3s ease; }
    .placeholder { color: var(--gold); font-size: 13px; opacity: 0.5; cursor: pointer; }

    /* Buttons */
    .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--gold); background: white; color: var(--gold); font-size: 20px; cursor: pointer; }
    .btn-master { flex: 1; padding: 14px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 13px; }
    .btn-master.off { background: white; border: 1px solid var(--gold); color: var(--gold); }
    .btn-master.on { background: var(--success); color: white; }

    /* Spaced Repetition Badges */
    .sr-badge { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-left: 10px; }
    .sr-0 { background: #eee; color: #666; } /* Nouveau */
    .sr-1 { background: #ffebee; color: #c62828; } /* Apprentissage */
    .sr-4 { background: #e8f5e9; color: #2e7d32; } /* Maîtrisé */

    /* Tabs Bar */
    .tabs {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      display: flex; justify-content: space-around; padding: 12px 5px 25px;
      border-top: 1px solid rgba(0,0,0,0.05); z-index: 100;
    }
    .tab-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--ink-light); opacity: 0.4; flex: 1; }
    .tab-item.active { opacity: 1; color: var(--gold); }
    .tab-icon { font-size: 20px; }
    .tab-label { font-size: 10px; font-weight: bold; }

    /* Inputs for Write Mode */
    .write-input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--gold-bg); font-family: serif; font-size: 18px; text-align: center; outline: none; transition: 0.3s; }
    .write-input:focus { border-color: var(--gold); }
    .write-input.correct { border-color: var(--success); background: #e8f5e9; }
    .write-input.wrong { border-color: var(--error); background: #ffebee; }

    /* Grid for Categories */
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cat-card { background: white; padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--gold-bg); box-shadow: var(--shadow); cursor: pointer; }
    .cat-icon { font-size: 24px; margin-bottom: 5px; }
    .cat-name { font-weight: bold; font-size: 13px; color: var(--ink-light); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>
    <h1 id="page-title">Chargement...</h1>
  </header>

  <main id="app-content"></main>

  <nav class="tabs">
    <button class="tab-item active" onclick="nav('learn')"><span class="tab-icon">📖</span><span class="tab-label">Étude</span></button>
    <button class="tab-item" onclick="nav('quiz')"><span class="tab-icon">✨</span><span class="tab-label">Quiz</span></button>
    <button class="tab-item" onclick="nav('write')"><span class="tab-icon">✍️</span><span class="tab-label">Écrit</span></button>
    <button class="tab-item" onclick="nav('cats')"><span class="tab-icon">🏷️</span><span class="tab-label">Thèmes</span></button>
    <button class="tab-item" onclick="nav('stats')"><span class="tab-icon">📊</span><span class="tab-label">Stats</span></button>
  </nav>
</div>

<script>
// --- DONNÉES & CATÉGORIES ---
const NAMES = [
  {id:1,ar:"ٱلرَّحْمَـٰنُ",trans:"Ar-Rahmân",fr:"Le Tout Miséricordieux",cat:"misericorde"},
  {id:2,ar:"ٱلرَّحِيمُ",trans:"Ar-Rahîm",fr:"Le Très Miséricordieux",cat:"misericorde"},
  {id:3,ar:"ٱلْمَلِكُ",trans:"Al-Malik",fr:"Le Souverain",cat:"puissance"},
  {id:4,ar:"ٱلْقُدُّوسُ",trans:"Al-Quddûs",fr:"Le Très Saint",cat:"majeste"},
  {id:5,ar:"ٱلسَّلَامُ",trans:"As-Salâm",fr:"La Source de la Paix",cat:"misericorde"},
  {id:11,ar:"ٱلْخَالِقُ",trans:"Al-Khâliq",fr:"Le Créateur",cat:"creation"},
  {id:19,ar:"ٱلْعَلِيمُ",trans:"Al-'Alîm",fr:"L'Omniscient",cat:"sagesse"},
  {id:46,ar:"ٱلْحكِيمُ",trans:"Al-Hakîm",fr:"Le Sage",cat:"sagesse"},
  // ... (Ajoute les autres noms ici avec leurs 'cat')
];

const CAT_DEFS = {
  misericorde: { label: "Miséricorde", icon: "🤲" },
  puissance: { label: "Puissance", icon: "⚡" },
  majeste: { label: "Majesté", icon: "👑" },
  sagesse: { label: "Sagesse", icon: "📖" },
  creation: { label: "Création", icon: "🌱" }
};

// --- LOGIQUE SPACED REPETITION (SR) ---
const SR_INTERVALS = [0, 1, 3, 7, 21]; // Jours entre révisions
const SR_LABELS = ["Nouveau", "Apprentissage", "Révision", "Acquis", "Maîtrisé"];

// --- ÉTAT ---
let state = {
  view: 'learn',
  learnIdx: 0,
  filter: 'all', // 'all' ou id de catégorie
  sr: JSON.parse(localStorage.getItem('asma-sr') || '{}'),
  stats: JSON.parse(localStorage.getItem('asma-stats') || '{ "correct": 0, "total": 0 }'),
  write: { q: null, val: '', status: '' }
};

function save() {
  localStorage.setItem('asma-sr', JSON.stringify(state.sr));
  localStorage.setItem('asma-stats', JSON.stringify(state.stats));
}

function getSR(id) {
  if (!state.sr[id]) state.sr[id] = { box: 0, next: 0 };
  return state.sr[id];
}

function promote(id, isCorrect) {
  let sr = getSR(id);
  if (isCorrect) {
    sr.box = Math.min(sr.box + 1, 4);
    state.stats.correct++;
  } else {
    sr.box = Math.max(sr.box - 1, 0);
  }
  sr.next = Date.now() + (SR_INTERVALS[sr.box] * 86400000);
  state.stats.total++;
  save();
}

// --- NAVIGATION ---
function nav(view) {
  state.view = view;
  state.isFlipped = false;
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelector(`[onclick="nav('${view}')"]`).classList.add('active');
  if(view === 'write') nextWrite();
  render();
}

function render() {
  const content = document.getElementById('app-content');
  const title = document.getElementById('page-title');
  
  // FILTRAGE
  let list = NAMES;
  if(state.filter !== 'all') list = NAMES.filter(n => n.cat === state.filter);

  if (state.view === 'learn') {
    title.innerText = state.filter === 'all' ? "Étude" : CAT_DEFS[state.filter].label;
    const n = list[state.learnIdx];
    const sr = getSR(n.id);
    content.innerHTML = `
      <div class="card" onclick="state.isFlipped = !state.isFlipped; render()">
        <div class="card-num">NOM ${n.id} / 99 <span class="sr-badge sr-${sr.box}">${SR_LABELS[sr.box]}</span></div>
        <div class="card-ar">${n.ar}</div>
        <div class="card-trans">${n.trans}</div>
        <div class="reveal-zone">
          ${state.isFlipped ? `<div class="meaning">${n.fr}</div>` : `<div class="placeholder">Cliquez pour voir le sens</div>`}
        </div>
      </div>
      <div class="card-nav" style="display:flex; gap:15px; margin-top:20px;">
        <button class="btn-circle" onclick="changeName(-1)">‹</button>
        <button class="btn-master off" onclick="state.isFlipped = true; render()">RÉVÉLER</button>
        <button class="btn-circle" onclick="changeName(1)">›</button>
      </div>
    `;
  }

  if (state.view === 'write') {
    title.innerText = "Mode Écriture";
    const n = state.write.q;
    content.innerHTML = `
      <div style="text-align:center; padding-bottom:20px;">
        <div class="card-ar">${n.ar}</div>
        <p>Tapez la translittération (ex: Ar-Rahman)</p>
      </div>
      <input type="text" class="write-input ${state.write.status}" 
             placeholder="Votre réponse..." 
             value="${state.write.val}"
             oninput="state.write.val = this.value"
             onkeydown="if(event.key==='Enter') checkWrite()">
      <button class="btn-master on" style="width:100%; margin-top:20px;" onclick="checkWrite()">VÉRIFIER</button>
      ${state.write.status === 'wrong' ? `<p style="text-align:center; color:var(--error); margin-top:10px;">Réponse : <b>${n.trans}</b></p>` : ''}
    `;
  }

  if (state.view === 'cats') {
    title.innerText = "Par Thématiques";
    content.innerHTML = `
      <div class="cat-grid">
        <div class="cat-card" onclick="state.filter='all'; nav('learn')">
          <div class="cat-icon">🌍</div><div class="cat-name">Tous les Noms</div>
        </div>
        ${Object.keys(CAT_DEFS).map(key => `
          <div class="cat-card" onclick="state.filter='${key}'; nav('learn')">
            <div class="cat-icon">${CAT_DEFS[key].icon}</div>
            <div class="cat-name">${CAT_DEFS[key].label}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  if (state.view === 'stats') {
    title.innerText = "Ma Progression";
    const precision = state.stats.total > 0 ? Math.round((state.stats.correct / state.stats.total) * 100) : 0;
    content.innerHTML = `
      <div class="card" style="min-height: auto; padding: 25px;">
        <div class="card-num">RÉUSSITE</div>
        <div style="font-size:40px; font-weight:bold; color:var(--gold);">${precision}%</div>
        <p style="font-size:14px; opacity:0.6;">Basé sur ${state.stats.total} tests</p>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        <div style="text-align:left;">
          <p><b>Maîtrise :</b> ${Object.values(state.sr).filter(s => s.box === 4).length} / 99</p>
        </div>
      </div>
    `;
  }
}

// --- ACTIONS ---
function changeName(dir) {
  const list = state.filter === 'all' ? NAMES : NAMES.filter(n => n.cat === state.filter);
  state.learnIdx = (state.learnIdx + dir + list.length) % list.length;
  state.isFlipped = false;
  render();
}

function nextWrite() {
  // Choisir un nom au hasard
  state.write = { q: NAMES[Math.floor(Math.random()*NAMES.length)], val: '', status: '' };
}

function checkWrite() {
  const target = state.write.q.trans.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z]/g, "");
  const input = state.write.val.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z]/g, "");
  
  if (input === target) {
    state.write.status = 'correct';
    promote(state.write.q.id, true);
    render();
    setTimeout(() => { nextWrite(); render(); }, 1200);
  } else {
    state.write.status = 'wrong';
    promote(state.write.q.id, false);
    render();
  }
}

// Lancement
render();
</script>
</body>
</html>
